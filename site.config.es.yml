        all: todos
        featured: destacados
        live: publicados
        exploration: exploracion
      resultsPrefix: Mostrando
      resultNounSingular: proyecto
      resultNounPlural: proyectos
    projects:
      - slug: fuel-precision
        title: Fuel Precision
        summary: >
          Plataforma en produccion de inteligencia de precios de combustible en
          Espana que convierte datos diarios del gobierno en busqueda por ruta,
          planificacion de viajes y analitica regional para conductores y casos
          de uso cercanos a flota.
        status: featured
        year: "2026"
        tags:
          - Python
          - FastAPI
          - DuckDB
          - GCP
          - Geospatial
          - Data Products
        highlights:
          - Construccion de un producto de datos end-to-end, desde la ingesta y validacion automatizada hasta el serving analitico de baja latencia.
          - Transformacion de datos brutos de estaciones en herramientas de decision como ranking de mejor estacion, planificacion de paradas y analisis regional de precios.
          - Estructuracion del sistema para refrescos repetibles, resultados explicables y despliegue real, no como una demo de portfolio.
        links:
          - label: Aplicacion en vivo
            href: https://fuelprecision.com
            external: true
          - label: Repositorio GitHub
            href: https://github.com/gerardovitale/travel-assistant
            external: true
      - slug: trackass
        title: TrackAss
        summary: >
          Plataforma de analitica de email orientada a privacidad que registra
          aperturas y clics en enlaces firmados, filtra trafico de bots y
          proxies, y expone la actividad mediante dashboard ligero y extension
          de Gmail.
        status: featured
        year: "2026"
        tags:
          - Python
          - FastAPI
          - Security
          - SQLModel
          - Product Engineering
          - Browser Extension
        highlights:
          - Construccion del backend como sistema de producto real con autenticacion, migraciones, redirects firmados, aislamiento multi-tenant, rate limiting y tests automatizados.
          - Foco en analitica creible al clasificar trafico de bots, proxies y self-opens en lugar de tratar todos los eventos como senales humanas.
          - Extension del producto mas alla del API con un flujo de Gmail y dashboard para demostrar entrega completa, no solo diseno de endpoints.
        links:
          - label: Repositorio GitHub
            href: https://github.com/gerardovitale/trackass
            external: true
      - slug: gerardo-vitale-portfolio
        title: Gerardo Vitale Portfolio
        summary: >
          Sistema bilingue de portfolio que convierte contenido de marca
          personal en un sitio estatico listo para produccion, con configuracion
          tipada, SEO protegido, checks de accesibilidad e interactividad
          ligera.
        status: live
        year: "2026"
        tags:
          - Astro
          - TypeScript
          - SEO
          - Accessibility
          - CI/CD
        highlights:
          - Construccion del sitio como sistema reutilizable de contenido y no como pagina unica, con config tipada, soporte multi idioma y validacion en build.
          - Incorporacion de metadata canonica, structured data, cobertura de accesibilidad y despliegue containerizado como preocupaciones reales de produccion.
          - Uso del portfolio como activo de marca para alinear CV, LinkedIn, Malt y narrativa de proyectos bajo un mismo perfil profesional.
        links:
          - label: Sitio en vivo
            href: /
            external: false
          - label: Repositorio GitHub
            href: https://github.com/gerardovitale/portfolio
            external: true

  - id: experience
    enabled: true
    navLabel: Experiencia
    intro:
      eyebrow: Experiencia
      title: Ingenieria de datos y entrega backend enterprise en cuatro dominios.
      description: >
        Mi experiencia combina modernizacion de plataformas de datos, servicios
        backend y disciplina de entrega. El objetivo recurrente es hacer que
        sistemas complejos sean mas fiables, auditables y utiles para
        decisiones reales de negocio.
    homeCard:
      eyebrow: Trayectoria
      title: Experiencia
      description: Roles, progresion y los sistemas construidos en cada etapa.
    timeline:
      eyebrow: Timeline
      title: Roles e impacto
      description: >
        El hilo conductor es claro: plataformas de datos mas solidas, rutas de
        entrega mas limpias, mejores controles de calidad y sistemas que se
        comportan bien en produccion.
    entries:
      - company: Axpo
        role: Data Engineer
        period: Dec 2025 - Actualidad
        location: Madrid, Espana
        summary: >
          Mantiene y evoluciona una plataforma de datos sobre Kubernetes para
          flujos de optimizacion de activos y logistica en mercados energeticos
          de la UE.
        achievements:
          - Construye componentes backend y de plataforma con Python, FastAPI, PostgreSQL y Airflow para servicios internos y workflows criticos de negocio.
          - Mejora la escalabilidad, resiliencia y operabilidad diaria de la plataforma a traves de infraestructura base, integraciones y practicas de ingenieria.
          - Colabora en una capacidad interna de lineage end-to-end orientada a trazabilidad a nivel de fila para depuracion, auditoria e investigaciones de calidad.
      - company: Thoughtworks
        role: Data Engineer
        period: Mar 2023 - Dic 2025
        location: Madrid, Espana
        summary: >
          Entrego modernizacion de plataformas de datos para clientes de
          aerolineas, salud y e-commerce, con foco en workflows auditables,
          arquitecturas escalables y productos de datos fiables.
        achievements:
          - Modernizo una plataforma de serving para aerolineas con SQLMesh, Snowflake, AWS Glue y SYNQ para crear workflows escalables, mantenibles y auditables.
          - Entrego kits de despliegue en Terraform y pipelines modulares de SQLMesh que mejoraron la consistencia de CI/CD, la integridad historica y la fiabilidad de releases.
          - Construyo una prueba de concepto en Microsoft Fabric con PySpark, Delta, Power BI, Purview y Great Expectations para soportar gobierno escalable y analitica confiable.
          - Mejoro rendimiento, confianza en metricas y alineamiento con negocio en una plataforma de e-commerce mediante redisenio de pipelines y colaboracion estrecha con stakeholders.
      - company: Thoughtworks
        role: Junior Data Engineer
        period: Mar 2022 - Mar 2023
        location: Madrid, Espana
        summary: >
          Desarrollo capacidades fundacionales de plataforma para un gran
          cliente de e-commerce, combinando ELT, testing, observabilidad y
          controles de calidad de datos.
        achievements:
          - Ayudo a construir una plataforma de datos desde cero que servia productos de datos criticos consumidos desde dashboards de MicroStrategy.
          - Disenio pipelines ELT que integraban fuentes transaccionales y orientadas a eventos, con CI/CD sobre Kubernetes para mejorar la fiabilidad de despliegue.
          - Implemento controles de calidad con PyDeequ y alertas con LightStep y Grafana para reforzar SLAs y confianza en las metricas.
          - Contribuyo a la entrega mediante estrategia de testing, demos, trabajo agile y pair programming para mantener pipelines robustos y mantenibles.
      - company: Telefonica
        role: Junior Backend Developer
        period: Sep 2021 - Feb 2022
        location: Madrid, Espana
        summary: >
          Desarrollo de servicios backend containerizados para TV Open Platform
          con disciplina de ingenieria y colaboracion cross-functional.
        achievements:
          - Desarrollo de microservicios con TDD, principios SOLID y Clean Architecture en un entorno multidisciplinar.
          - Construccion de un consumer en Python con Kafka, integrado con SQL Server y desplegado mediante Jenkins CI/CD para una entrega backend fiable.
          - Incorporacion de metricas con Prometheus y dashboards en Grafana para mejorar visibilidad del servicio y monitorizacion operativa en tiempo real.


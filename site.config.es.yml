      description: Productos de datos, sistemas backend y entrega pensada para produccion.
    interaction:
      eyebrow: Explorar proyectos
      title: Filtra por stack, tipo de producto o foco de entrega.
      description: >
        Cada proyecto esta aqui para mostrar una faceta distinta del mismo
        perfil: pipelines de datos, servicios backend, postura de seguridad,
        product thinking e implementacion orientada a produccion.
      searchLabel: Buscar proyectos
      searchPlaceholder: Buscar por titulo, stack o resumen
      statusToolbarLabel: Filtros por estado del proyecto

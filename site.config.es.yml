sections:
  - id: home
    navLabel: Inicio
    hero:
      eyebrow: Data Engineer & Backend Developer
      headline: Gerardo Vitale
      intro: >
        Ayudo a equipos a diseñar y evolucionar plataformas de datos,
        servicios backend y flujos analíticos que se mantienen fiables bajo
        presión de producción. Mi trabajo combina Python, Spark, SQL, dbt,
        SQLMesh, FastAPI, entrega cloud-native y la disciplina operativa
        necesaria para mantener sistemas críticos de negocio dignos de
        confianza.
      missionLabel: Lo que construyo
      mission: >
        Sistemas de datos y backend orientados a resultados: pipelines
        fiables, transformaciones auditables, servicios listos para integrarse
        vía API y rutas de entrega que reducen sorpresas tanto para
        ingeniería como para stakeholders. Combino experiencia enterprise con
        proyectos propios que demuestran una ejecución end-to-end.
      availability: Disponible para proyectos freelance de ingeniería de datos y backend.
      primaryCta:
        label: Hablemos de un proyecto
        href: mailto:gerardo.vitale.errico@gmail.com
      secondaryCta:
        label: Ver trabajo seleccionado
        href: /projects
      supportNote: >
        Mi trabajo actual está centrado en los mercados energéticos europeos
        en Axpo. Entre mis productos personales más recientes están Fuel
        Precision, TrackAss y este sistema de portfolio: tres formas
        distintas de mostrar ingeniería de datos, desarrollo backend y product
        thinking en producción.
    stats:
      - label: Experiencia
        value: 4+ Años
        detail: Construyendo plataformas de datos, servicios backend y flujos analíticos en entornos enterprise.
      - label: Dominios
        value: 4 Sectores
        detail: Energía, e-commerce, salud y aerolíneas con requisitos reales de fiabilidad y entrega.
      - label: Entrega
        value: Plataformas + APIs
        detail: Desde la ingesta y la transformación hasta los controles de calidad, las capas de serving y los workflows orientados a producto.
    principlesIntro:
      eyebrow: Principios de trabajo
      title: Cómo espero que se comporten los sistemas
    principles:
      - title: Hacer que los sistemas de datos inspiren confianza
        body: >
          Prefiero transformaciones explícitas, ownership claro y rutas de
          entrega trazables para que los equipos puedan depurar, auditar y
          cambiar sistemas sin depender de la intuición.
      - title: Tratar la calidad como comportamiento del producto
        body: >
          Métricas fiables, lineage, observabilidad y checks de calidad forman
          parte del entregable; no son una limpieza pendiente para después.
      - title: Construir para producción, no para demos
        body: >
          Releases sólidos, automatización, testing y claridad operativa
          importan porque el sistema tiene que seguir siendo útil después del
          lanzamiento y después del handoff.

  - id: projects
    enabled: true
    navLabel: Proyectos
    intro:
      eyebrow: Trabajo seleccionado
      title: Productos y plataformas que demuestran entrega end-to-end.
      description: >
        Este trabajo combina ingeniería de datos, desarrollo backend y product
        thinking. El patrón común es convertir datos en bruto o workflows
        confusos en sistemas útiles, explicables y seguros de operar.
    homeCard:
      eyebrow: Trabajo seleccionado
      title: Proyectos
      description: Productos de datos, sistemas backend y una entrega pensada para producción.
    interaction:
      eyebrow: Explorar proyectos
      title: Filtra por stack, tipo de producto o foco de entrega.
      description: >
        Cada proyecto está aquí para mostrar una faceta distinta del mismo
        perfil: pipelines de datos, servicios backend, postura de seguridad,
        product thinking e implementación orientada a producción.
      searchLabel: Buscar proyectos
      searchPlaceholder: Buscar por título, stack o resumen
      statusToolbarLabel: Filtros por estado del proyecto
      statusLabels:
        all: todos
        featured: destacados
        live: publicados
        exploration: exploración
      resultsPrefix: Mostrando
      resultNounSingular: proyecto
      resultNounPlural: proyectos
    projects:
      - slug: fuel-precision
        title: Fuel Precision
        summary: >
          Plataforma en producción de inteligencia de precios de combustible en
          España que convierte datos diarios del gobierno en búsquedas por
          ruta, planificación de viajes y analítica regional para conductores
          y casos de uso orientados a flotas.
        status: featured
        year: "2026"
        tags:
          - Python
          - FastAPI
          - DuckDB
          - GCP
          - Geospatial
          - Data Products
        highlights:
          - Construcción de un producto de datos end-to-end, desde la ingesta y la validación automatizadas hasta el serving analítico de baja latencia.
          - Transformación de datos brutos de estaciones en herramientas de decisión como ranking de mejores estaciones, planificación de paradas y análisis regional de precios.
          - Estructuración del sistema para refrescos repetibles, resultados explicables y despliegue real, no como una simple demo de portfolio.
        links:
          - label: Aplicación en vivo
            href: https://fuelprecision.com
            external: true
          - label: Repositorio GitHub
            href: https://github.com/gerardovitale/travel-assistant
            external: true
      - slug: trackass
        title: Email Tracker Assistant
        summary: >
          Plataforma de analítica de email orientada a la privacidad que
          registra aperturas y clics en enlaces firmados, filtra tráfico de
          bots y proxies, y expone la actividad mediante un dashboard ligero y
          una extensión para Gmail.
        status: featured
        year: "2026"
        tags:
          - Python
          - FastAPI
          - Security
          - SQLModel
          - Product Engineering
          - Browser Extension
        highlights:
          - Construcción del backend como un sistema de producto real, con autenticación, migraciones, redirects firmados, aislamiento multi-tenant, rate limiting y tests automatizados.
          - Foco en una analítica creíble al clasificar tráfico de bots, proxies y self-opens en lugar de tratar todos los eventos como señales humanas.
          - Extensión del producto más allá de la API con un flujo de Gmail y un dashboard para demostrar entrega completa, no solo diseño de endpoints.
        links:
          - label: Repositorio GitHub
            href: https://github.com/gerardovitale/trackass
            external: true
      - slug: gerardo-vitale-portfolio
        title: Gerardo Vitale Portfolio
        summary: >
          Sistema bilingüe de portfolio que convierte contenido de marca
          personal en un sitio estático listo para producción, con
          configuración tipada, salvaguardas de SEO, checks de accesibilidad e
          interactividad ligera.
        status: live
        year: "2026"
        tags:
          - Astro
          - TypeScript
          - SEO
          - Accessibility
          - CI/CD
        highlights:
          - Construcción del sitio como un sistema reutilizable de contenido y no como una página única, con configuración tipada, soporte multidioma y validación en build.
          - Incorporación de metadata canónica, structured data, cobertura de accesibilidad y despliegue containerizado como preocupaciones reales de producción.
          - Uso del portfolio como activo de marca para alinear el CV, LinkedIn, Malt y la narrativa de proyectos bajo un mismo perfil profesional.
        links:
          - label: Sitio web
            href: /
            external: false
          - label: Repositorio GitHub
            href: https://github.com/gerardovitale/portfolio
            external: true

  - id: experience
    enabled: true
    navLabel: Experiencia
    intro:
      eyebrow: Experiencia
      title: Ingeniería de datos y entrega backend en entornos enterprise a lo largo de cuatro sectores.
      description: >
        Mi experiencia combina modernización de plataformas de datos,
        servicios backend y disciplina de entrega. El objetivo recurrente es
        hacer que sistemas complejos sean más fiables, auditables y útiles
        para decisiones reales de negocio.
    homeCard:
      eyebrow: Trayectoria
      title: Experiencia
      description: Roles, progresión y los sistemas construidos en cada etapa.
    timeline:
      eyebrow: Timeline
      title: Roles e impacto
      description: >
        El hilo conductor es claro: plataformas de datos más sólidas, rutas
        de entrega más limpias, mejores controles de calidad y sistemas que se
        comportan bien en producción.
    entries:
      - company: Axpo
        role: Data Engineer
        period: Dic 2025 - Actualidad
        location: Madrid, España
        summary: >
          Mantiene y evoluciona una plataforma de datos sobre Kubernetes para
          flujos de optimización de activos y logística en mercados
          energéticos de la UE.
        achievements:
          - Construye componentes backend y de plataforma con Python, FastAPI, PostgreSQL y Airflow para servicios internos y workflows críticos de negocio.
          - Mejora la escalabilidad, la resiliencia y la operabilidad diaria de la plataforma a través de infraestructura base, integraciones y prácticas de ingeniería.
          - Colabora en una capacidad interna de lineage end-to-end orientada a la trazabilidad a nivel de fila para depuración, auditoría e investigaciones de calidad de datos.
      - company: Thoughtworks
        role: Data Engineer
        period: Mar 2023 - Dic 2025
        location: Madrid, España
        summary: >
          Entregó la modernización de plataformas de datos para clientes de
          aerolíneas, salud y e-commerce, con foco en workflows auditables,
          arquitecturas escalables y productos de datos fiables.
        achievements:
          - Modernizó una plataforma de serving para aerolíneas con SQLMesh, Snowflake, AWS Glue y SYNQ para crear workflows escalables, mantenibles y auditables.
          - Entregó kits de despliegue en Terraform y pipelines modulares de SQLMesh que mejoraron la consistencia de CI/CD, la integridad histórica y la fiabilidad de los releases.
          - Construyó una prueba de concepto en Microsoft Fabric con PySpark, Delta, Power BI, Purview y Great Expectations para reforzar un gobierno escalable y una analítica fiable.
          - Mejoró el rendimiento, la confianza en métricas y el alineamiento con negocio en una plataforma de e-commerce mediante el rediseño de pipelines y una colaboración estrecha con stakeholders.
      - company: Thoughtworks
        role: Junior Data Engineer
        period: Mar 2022 - Mar 2023
        location: Madrid, España
        summary: >
          Desarrolló capacidades fundacionales de plataforma para un gran
          cliente de e-commerce, combinando ELT, testing, observabilidad y
          controles de calidad de datos.
        achievements:
          - Ayudó a construir una plataforma de datos desde cero que servía productos de datos críticos consumidos desde dashboards de MicroStrategy.
          - Diseñó pipelines ELT que integraban fuentes transaccionales y orientadas a eventos, con CI/CD sobre Kubernetes para mejorar la fiabilidad del despliegue.
          - Implementó controles de calidad con PyDeequ y alertas con LightStep y Grafana para reforzar los SLAs y la confianza en las métricas.
          - Contribuyó a la entrega mediante estrategia de testing, demos, trabajo agile y pair programming para mantener pipelines robustos y mantenibles.
      - company: Telefonica
        role: Junior Backend Developer
        period: Sep 2021 - Feb 2022
        location: Madrid, España
        summary: >
          Desarrolló servicios backend containerizados para TV Open Platform
          con disciplina de ingeniería y colaboración cross-functional.
        achievements:
          - Desarrolló microservicios con TDD, principios SOLID y Clean Architecture en un entorno multidisciplinar.
          - Construyó un consumer en Python con Kafka, integrado con SQL Server y desplegado mediante Jenkins CI/CD para una entrega backend fiable.
          - Incorporó métricas con Prometheus y dashboards en Grafana para mejorar la visibilidad del servicio y la monitorización operativa en tiempo real.


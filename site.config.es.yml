person:
  name: Gerardo Vitale
  role: Ingeniero de Datos y Constructor de Plataformas de Datos
  location: Madrid, Espana
  availability: Disponible para colaboraciones freelance de plataformas de datos e ingenieria analitica con equipos que necesitan entrega fiable, no presentaciones vacias.
  intro: >
    Diseno y hago evolucionar plataformas de datos que siguen siendo fiables
    bajo presion de produccion. Mi trabajo abarca Python, Spark, SQL, dbt,
    SQLMesh y arquitecturas cloud-native, con un sesgo claro hacia pipelines
    robustos, releases auditables y equipos de analitica que pueden avanzar sin
    perder confianza en los datos.
  mission: >
    Ayudo a los equipos a entregar productos de datos que sean mas faciles de
    entender, mas seguros de cambiar y mas creibles para las personas que
    dependen de ellos. El foco esta en DataOps practico, arquitectura
    resiliente y practicas de entrega que resisten en produccion.
  email: gerardo.vitale.errico@gmail.com
  brandMark: GV
  socialLinks:
    - label: GitHub
      href: https://github.com/gerardovitale
      external: true
    - label: LinkedIn
      href: https://www.linkedin.com/in/gerardo-vitale-errico/
      external: true
    - label: Email
      href: mailto:gerardo.vitale.errico@gmail.com
      external: false

seo:
  title: Gerardo Vitale | Ingeniero de Datos
  description: >
    Portfolio en espanol para un ingeniero de datos que construye plataformas
    fiables, analitica lista para decisiones y flujos de entrega seguros para
    produccion.
  siteUrl: https://gerardo-vitale.com


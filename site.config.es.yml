sections:
  - id: home
    navLabel: Inicio
    hero:
      eyebrow: Data Engineer & Backend Developer
      headline: Gerardo Vitale
      intro: >
        Ayudo a equipos a diseniar y evolucionar plataformas de datos,
        servicios backend y flujos analiticos que siguen siendo fiables bajo
        presion de produccion. Mi trabajo mezcla Python, Spark, SQL, dbt,
        SQLMesh, FastAPI, entrega cloud-native y la disciplina operativa
        necesaria para mantener sistemas criticos de negocio.
      missionLabel: Lo que construyo
      mission: >
        Sistemas de datos y backend orientados a resultados: pipelines fiables,
        transformaciones auditables, servicios listos para API y rutas de
        entrega que reducen sorpresas para ingenieria y stakeholders. Combino
        experiencia enterprise con proyectos propios que demuestran ejecucion
        end-to-end.
      availability: Disponible para proyectos freelance de ingenieria de datos y backend.
      primaryCta:
        label: Hablemos de un proyecto
        href: mailto:gerardo.vitale.errico@gmail.com
      secondaryCta:
        label: Ver trabajo seleccionado
        href: /projects
      supportNote: >
        Mi trabajo actual esta centrado en mercados energeticos europeos en
        Axpo. Los proyectos personales recientes incluyen Fuel Precision,
        TrackAss y este sistema de portfolio: tres formas distintas de mostrar
        ingenieria de datos, desarrollo backend y product thinking en
        produccion.
    stats:
      - label: Experiencia
        value: 4+ Anos
        detail: Construyendo plataformas de datos, servicios backend y flujos analiticos en entornos enterprise.
      - label: Dominios
        value: 4 Sectores
        detail: Energia, e-commerce, salud y aerolineas con requisitos reales de fiabilidad y entrega.
      - label: Entrega
        value: Plataformas + APIs
        detail: Desde ingestiones y transformaciones hasta controles de calidad, capas de serving y workflows orientados a producto.
    principlesIntro:
      eyebrow: Principios de trabajo
      title: Como espero que se comporten los sistemas
    principles:
      - title: Hacer que los sistemas sean faciles de confiar
        body: >
          Prefiero transformaciones explicitas, ownership claro y rutas de
          entrega trazables para que los equipos puedan depurar, auditar y
          cambiar sistemas sin depender de intuicion.
      - title: Tratar la calidad como comportamiento del producto
        body: >
          Metricas fiables, lineage, observabilidad y checks de calidad forman
          parte del entregable, no son limpieza pendiente para despues.
      - title: Construir para produccion, no para demos
        body: >
          Releases solidos, automatizacion, testing y claridad operativa
          importan porque el sistema tiene que seguir siendo util despues del
          lanzamiento y despues del handoff.

  - id: projects
    enabled: true
    navLabel: Proyectos
    intro:
      eyebrow: Trabajo Seleccionado
      title: Productos y plataformas que demuestran entrega end-to-end.
      description: >
        Este trabajo combina ingenieria de datos, desarrollo backend y product
        thinking. El patron comun es convertir datos en bruto o workflows
        confusos en sistemas utiles, explicables y seguros de operar.
    homeCard:
      eyebrow: Trabajo seleccionado

      - title: Servicios backend detrás de productos de datos
        summary: >
          Me interesa construir la capa de servicio alrededor de productos de
          datos, especialmente cuando APIs, workflows y controles de seguridad
          definen la utilidad real del sistema final.
      - title: Explicabilidad, lineage y calidad
        summary: >
          Los sistemas más valiosos no solo son rápidos. También son más
          fáciles de auditar, depurar y evolucionar sin romper la confianza en
          sus resultados.
    nowHeading:
      eyebrow: Ahora

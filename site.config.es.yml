    now:
      - Profundizando en trabajo de plataforma alrededor de lineage, resiliencia y operabilidad en mercados energéticos europeos en Axpo.
      - Asumiendo colaboraciones freelance selectivas en ingeniería de datos y entrega backend para equipos que necesitan una ejecución fiable.
      - Siguiendo construyendo productos propios con Fuel Precision, TrackAss y esta plataforma de portfolio.

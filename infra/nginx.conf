server {
  listen 8081;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  absolute_redirect off;
  port_in_redirect off;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /healthz.json {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  error_page 404 /404.html;

  location = /404.html {
    internal;
  }

  # Serve known section routes directly so clean URLs never depend on
  # directory redirects that can leak the container port through proxies.
  location = / {
    try_files /index.html =404;
  }

  location = /es {
    try_files /es/index.html =404;
  }

  location ~ ^/(projects|experience|interests)/?$ {
    try_files /$1/index.html =404;
  }

  location ~ ^/es/(projects|experience|interests)/?$ {
    try_files /es/$1/index.html =404;
  }

  location / {
    try_files $uri $uri/index.html =404;
  }
}

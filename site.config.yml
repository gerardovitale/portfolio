person:
  name: Gerardo Vitale
  role: Data Engineer and Data Platform Builder
  location: Madrid, Spain
  availability: Open to data engineering roles where platform reliability and business impact both matter.
  intro: >
    I design and evolve data platforms that stay dependable under production
    pressure. My work spans Python, Spark, SQL, dbt, SQLMesh, and cloud-native
    architectures, with a bias toward reliable pipelines and high-trust
    analytics delivery.
  mission: >
    I like building data systems that teams can audit, evolve, and rely on for
    decisions. The focus is practical DataOps, resilient architecture, and
    delivery practices that keep business-critical data products moving.
  email: gerardo.vitale.errico@gmail.com
  brandMark: GV
  socialLinks:
    - label: GitHub
      href: https://github.com/gerardovitale
      external: true
    - label: LinkedIn
      href: https://www.linkedin.com/in/gerardo-vitale-errico/
      external: true
    - label: Email
      href: mailto:gerardo.vitale.errico@gmail.com
      external: false

seo:
  title: Gerardo Vitale | Data Engineer
  description: >
    Portfolio for a data engineer focused on scalable data platforms, DataOps,
    and reliable analytics delivery across energy, healthcare, e-commerce, and
    technology domains.
  siteUrl: https://portfolio.example.com


            external: false

  - id: experience
    enabled: true
    navLabel: Experience
    intro:
      eyebrow: Experience / CV
      title: Experience across platform engineering, analytics delivery, and data quality.
      description: >
        Recent work spans EU energy markets and consulting delivery across
        airline, healthcare, and e-commerce data platforms. The common thread
        is making complex systems more reliable, auditable, and easier to ship.
    homeCard:
      eyebrow: Route 03
      title: Experience / CV
      description: Roles, achievements, and the operating habits behind the work.
    timeline:
      eyebrow: Timeline
      title: Selected roles
      description: >
        The work centers on platform modernization, reliable data products, and
        engineering practices that hold up under real operations.
    entries:
      - company: Axpo
        role: Data Engineer
        period: Dec 2025 - Present
        location: Madrid, Spain
        summary: >
          Maintains and evolves a Kubernetes-based data platform for asset
          optimization and logistics workflows in EU energy markets.
        achievements:
          - Builds backend and platform components with Python, FastAPI, PostgreSQL, and Airflow for internal data services.
          - Improves scalability, resilience, and day-to-day operability across core platform infrastructure and integrations.
          - Contributes to an in-house end-to-end lineage solution for row-level traceability, debugging, auditing, and quality investigations.
      - company: Thoughtworks
        role: Data Engineer
        period: Mar 2023 - Dec 2025
        location: Madrid, Spain
        summary: >
          Delivered data platform and DataOps work across airline, healthcare,
          and e-commerce engagements, with emphasis on auditable workflows and
          reliable data products.
        achievements:
          - Modernized a data serving platform with SQLMesh, Snowflake, AWS Glue, and SYNQ to enable scalable and auditable workflows.
          - Built a Microsoft Fabric platform PoC with PySpark, Delta, Power BI, Purview, and automated testing backed by Great Expectations.
          - Improved pipeline performance, metrics reliability, and stakeholder alignment for a leading e-commerce platform.
      - company: Europe's Leading e-Commerce
        role: Junior Data Engineer
        period: Mar 2022 - Mar 2023
        location: Germany
        summary: >
          Helped build a new data platform and business-facing data products for
          operational monitoring and decision support.
        achievements:
          - Designed ELT pipelines from transactional and event-driven systems with Kubernetes-backed CI/CD for dependable releases.
          - Implemented data quality and observability with PyDeequ, LightStep, and Grafana to keep metrics trustworthy.
          - Added unit and integration testing and ran demos that kept stakeholders aligned on delivery progress.
      - company: Telefonica
        role: Junior Backend Developer
        period: Sep 2021 - Feb 2022
        location: Madrid, Spain
        summary: >
          Built containerized backend services for the TV Open Platform with
          strong engineering discipline and cross-functional collaboration.
        achievements:
          - Developed microservices using TDD, SOLID principles, and Clean Architecture practices.
          - Shipped a Python Kafka consumer service integrated with SQL Server and deployed through Jenkins CI/CD.
          - Added Prometheus metrics and Grafana dashboards for real-time service visibility.

  - id: interests
    enabled: true
    navLabel: Interests
    intro:
      eyebrow: Stack and Interests
      title: The platforms, practices, and data problems I keep returning to.
      description: >
        This route ties together the tooling I rely on most and the technical
        patterns I care about: quality, lineage, observability, and reliable
        analytics delivery.
    homeCard:
      eyebrow: Route 04
      title: Stack and Interests
      description: >
        Tools, technical preferences, and the problems I am naturally pulled
        toward.
    skillsHeading:
      eyebrow: Capabilities
      title: Tools and operating preferences
    skillGroups:
      - title: Data Platforms
        description: >
          Core tools for building, transforming, and operating production data
          platforms.
        items:
          - Python
          - Spark
          - SQL
          - dbt
          - SQLMesh
          - Airflow
      - title: Cloud and Analytics Stack
        description: >
          Cloud and warehouse tooling I have used to deliver governed analytics
          and scalable data products.
        items:
          - Snowflake
          - AWS Glue
          - Microsoft Fabric
          - Delta Lake
          - Power BI
          - GCP
      - title: Delivery Practice
        description: >
          The engineering and quality practices that keep data products stable
          after they ship.
        items:
          - Kubernetes
          - Terraform
          - FastAPI
          - PostgreSQL
          - CI/CD
          - Great Expectations
          - PyDeequ
    interestsHeading:
      eyebrow: Interests
      title: What keeps my attention
    interests:
      - title: Data lineage and auditability
        summary: >
          I keep returning to systems that make data movement explainable, from
          source changes to downstream business decisions.
      - title: High-trust data quality systems
        summary: >
          I am interested in checks, observability, and testing strategies that
          make metrics reliable enough to use with confidence.
      - title: Domain-heavy platform work
        summary: >
          Energy, healthcare, e-commerce, and travel all force useful tradeoffs
          between speed, governance, and operational clarity.
    nowHeading:
      eyebrow: Now
      title: Current focus
    now:
      - Deepening platform work around lineage, resilience, and day-to-day operability in EU energy markets.
      - Looking for roles where Python, SQL, and DataOps practices improve business-critical data products.
      - Continuing to sharpen cloud-native platform and analytics delivery patterns across teams and domains.

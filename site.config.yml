        summary: >
          A monochrome editorial portfolio system translated from Stitch
          concepts into a production-grade static application.
        status: featured
        year: "2026"
        tags:
          - Astro
          - TypeScript
          - Design Systems
          - CI/CD
        highlights:
          - Converted exploratory screens into a maintainable route structure with typed content.
          - Designed for Raspberry Pi deployment with static output and containerized delivery.
        links:
          - label: View implementation plan
            href: /projects
            external: false
      - slug: trip-optimizer
        title: Trip Planner and Optimizer

sections:
  - id: home
    navLabel: Home
    hero:
      eyebrow: Home / Hero (Data Eng)
      headline: Gerardo Vitale
      intro: >
        I build and improve data platforms that stay readable, testable, and
        reliable under production pressure. The work spans Python, Spark, SQL,
        dbt, SQLMesh, and cloud-native systems that support business-critical
        decisions.
      missionLabel: How I work
      mission: >
        I care about data quality, release safety, and platform designs teams
        can actually reason about. The goal is not more pipeline surface area.
        It is dependable data products with clear operational ownership.
      availability: Open to data engineering roles where platform reliability and business impact both matter.
      primaryCta:
        label: View projects
        href: /projects
      secondaryCta:
        label: Read experience
        href: /experience
      supportNote: >
        Recent work spans EU energy markets and consulting delivery across
        airline, healthcare, and e-commerce platforms.
    stats:
      - label: Focus
        value: Data Platforms
        detail: From ingestion and transformation to auditable serving layers.
      - label: Delivery
        value: DataOps
        detail: CI/CD, testing, lineage, and quality checks are part of the platform.
      - label: Bias
        value: Operational Clarity
        detail: Observability, auditability, and maintainability are non-negotiable.
    principlesIntro:
      eyebrow: Working principles
      title: How I expect data systems to behave
    principles:
      - title: Build systems people can reason about
        body: >
          I prefer explicit data contracts, clear lineage, and ownership lines
          that make debugging and auditing possible without heroics.
      - title: Treat data quality as product behavior
        body: >
          Quality checks, trustworthy metrics, and historical traceability are
          part of the deliverable, not cleanup work for later.
      - title: Treat quality as a delivery feature
        body: >
          Testing, infrastructure as code, and repeatable release workflows are
          what let data teams move quickly without losing control.

  - id: projects
    enabled: true
    navLabel: Projects
    intro:
      eyebrow: Technical Projects
      title: Projects shaped for delivery, not just presentation.
      description: >
        The strongest work here is not only about technical output. It is about
        clearer contracts, safer release paths, and interfaces that help users
        decide faster.
    homeCard:
      eyebrow: Route 02
      title: Technical Projects
      description: Project narratives, tagged work, and delivery context.
    interaction:
      eyebrow: Interaction
      title: Filter the portfolio by intent.
      description: >
        The interactive layer on this route is client-side only. Content stays
        static at build time, and React is used only where state changes improve
        exploration.
      searchPlaceholder: Search by title, stack, or summary

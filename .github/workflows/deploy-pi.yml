name: Deploy To Raspberry Pi

on:
  workflow_run:
    workflows:
      - Release Image
    types:
      - completed

concurrency:
  group: deploy-pi
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Pull latest image and restart stack on Raspberry Pi
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_PATH: ${{ vars.PI_DEPLOY_PATH != '' && vars.PI_DEPLOY_PATH || '/opt/portfolio' }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: ${{ secrets.PI_PORT != '' && secrets.PI_PORT || '22' }}
          fingerprint: ${{ secrets.PI_HOST_FINGERPRINT }}
          command_timeout: 20m
          envs: DEPLOY_PATH,GHCR_USERNAME,GHCR_PAT
          script: |
            set -eu

            cd "$DEPLOY_PATH"
            test -f .env
            test -f docker-compose.pi.yml
            test -f Caddyfile

            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose --env-file .env -f docker-compose.pi.yml pull
            docker compose --env-file .env -f docker-compose.pi.yml up -d
            docker image prune -f

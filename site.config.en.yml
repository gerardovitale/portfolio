person:
  name: Gerardo Vitale
  role: Data Engineer and Data Platform Builder
  location: Madrid, Spain
  availability: Available for freelance data platform and analytics engineering work with teams that need reliable delivery, not slideware.
  intro: >
    I design and evolve data platforms that stay dependable under production
    pressure. My work spans Python, Spark, SQL, dbt, SQLMesh, and cloud-native
    architectures, with a bias toward reliable pipelines, auditable releases,
    and analytics teams that can move without losing trust.
  mission: >
    I help teams ship data products that are easier to reason about, safer to
    change, and credible with the people who depend on them. The focus is
    practical DataOps, resilient architecture, and delivery practices that
    hold up in production.
  email: gerardo.vitale.errico@gmail.com
  brandMark: GV
  socialLinks:
    - label: GitHub
      href: https://github.com/gerardovitale
      external: true
    - label: LinkedIn
      href: https://www.linkedin.com/in/gerardo-vitale-errico/
      external: true
    - label: Email
      href: mailto:gerardo.vitale.errico@gmail.com
      external: false


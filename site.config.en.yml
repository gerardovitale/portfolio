    interestsHeading:
      eyebrow: Focus areas
      title: What keeps my attention
    interests:
      - title: High-trust data platforms
        summary: >
          I keep coming back to systems that improve confidence in pipelines,
          metrics, and operational workflows under real production constraints.
      - title: Backend systems behind data products
        summary: >
          I like building the service layer around data products, especially
          when APIs, workflows, and security controls shape the usefulness of
          the final system.
      - title: Explainability, lineage, and quality
        summary: >
          The most valuable systems are not only fast. They are also easier to
          audit, debug, and evolve without damaging trust in the outputs.
    nowHeading:
      eyebrow: Now

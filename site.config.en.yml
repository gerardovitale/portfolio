sections:
  - id: home
    navLabel: Home
    hero:
      eyebrow: Home / Hero (Data Eng)
      headline: Gerardo Vitale
      intro: >
        I help companies build data platforms and analytics workflows that are
        easier to trust, easier to operate, and easier to extend. The work
        spans Python, Spark, SQL, dbt, SQLMesh, and cloud-native systems that
        support business-critical decisions without brittle delivery paths.
      missionLabel: What clients get
      mission: >
        Clear delivery ownership, production-aware engineering, and data
        systems that stay understandable after handoff. The goal is not more
        pipeline surface area. It is dependable data products with safer
        release paths and fewer surprises in operations.
      availability: Available for freelance data platform and analytics engineering engagements.
      primaryCta:
        label: Discuss a project
        href: mailto:gerardo.vitale.errico@gmail.com
      secondaryCta:
        label: View selected work
        href: /projects
      supportNote: >
        Recent work spans EU energy markets and consulting delivery across
        airline, healthcare, and e-commerce platforms, with repeated focus on
        platform reliability, lineage, and decision-ready analytics.
    stats:
      - label: Services
        value: Data Platforms
        detail: From ingestion and transformation to auditable serving layers and API-ready data products.
      - label: Delivery
        value: Production Safe
        detail: CI/CD, testing, lineage, and quality checks are part of the platform, not afterthoughts.
      - label: Background
        value: Multi-Domain
        detail: Energy, healthcare, airline, and e-commerce work under real delivery pressure.
    principlesIntro:
      eyebrow: Working principles
      title: How I expect data systems to behave
    principles:
      - title: Build systems people can reason about
        body: >
          I prefer explicit data contracts, clear lineage, and ownership lines
          that make debugging and auditing possible without heroics.
      - title: Treat data quality as product behavior
        body: >
          Quality checks, trustworthy metrics, and historical traceability are
          part of the deliverable, not cleanup work for later.
      - title: Treat quality as a delivery feature
        body: >
          Testing, infrastructure as code, and repeatable release workflows are
          what let data teams move quickly without losing control.

  - id: projects
    enabled: true
    navLabel: Projects
    intro:
      eyebrow: Technical Projects
      title: Projects shaped for delivery, not just presentation.
      description: >
        The strongest work here is not only about technical output. It is about
        clearer contracts, safer release paths, and systems that give users and
        stakeholders better decisions with less operational friction.
    homeCard:
      eyebrow: Route 02
      title: Technical Projects
      description: Project narratives, tagged work, and delivery context.
    interaction:
      eyebrow: Interaction
      title: Filter the portfolio by delivery intent.
      description: >
        The interactive layer on this route is client-side only. Content stays
        static at build time, and React is used only where state changes make
        technical due diligence faster.
      searchLabel: Search projects
      searchPlaceholder: Search by title, stack, or summary
      statusToolbarLabel: Project status filters
      statusLabels:
        all: all
        featured: featured
        live: live
        exploration: exploration
      resultsPrefix: Showing
      resultNounSingular: project
      resultNounPlural: projects
    projects:
      - slug: fuel-precision
        title: Fuel Precision
        summary: >
          Live fuel price intelligence platform for Spain that turns daily
          government station data into route-aware search, trip planning, and
          regional price analysis.
        status: featured
        year: "2026"
        tags:
          - Python
          - FastAPI
          - DuckDB
          - GCP
          - Data Products
          - Geospatial
        highlights:
          - "Built an end-to-end data product: daily ingestion from Spain's government fuel API into Parquet on GCS, then low-latency analytical serving through DuckDB and FastAPI."
          - Shipped user-facing decision tools including best-station ranking by total trip cost, route-based fuel stop planning, and map-driven regional price exploration.
          - Structured the application as a maintainable product rather than a demo, with delivery choices aimed at reliable refreshes and explainable results.
        links:
          - label: Live app
            href: https://fuelprecision.com
            external: true
          - label: GitHub repo
            href: https://github.com/gerardovitale/travel-assistant
            external: true
      - slug: zen-portfolio
        title: Zen Python Portfolio
        summary: >
          A monochrome editorial portfolio system translated from Stitch
          concepts into a production-grade static application with typed content,
          launch-safe metadata, and lightweight interactivity.
        status: live
        year: "2026"
        tags:
          - Astro
          - TypeScript
          - Design Systems
          - CI/CD
        highlights:
          - Converted exploratory screens into a maintainable route structure with typed content and schema-backed validation.
          - Added launch hardening for canonical metadata, structured data, accessibility checks, and containerized deployment.
        links:
          - label: View live portfolio
            href: /
            external: false

  - id: experience
    enabled: true
    navLabel: Experience
    intro:
      eyebrow: Experience / CV
      title: Experience across platform engineering, analytics delivery, and data quality.
      description: >
        Recent work spans EU energy markets and consulting delivery across
        airline, healthcare, and e-commerce data platforms. The common thread
        is making complex systems more reliable, auditable, and easier to ship.
    homeCard:
      eyebrow: Route 03
      title: Experience / CV
      description: Roles, achievements, and the operating habits behind the work.
    timeline:
      eyebrow: Timeline
      title: Selected roles
      description: >
        The work centers on platform modernization, reliable data products, and
        engineering practices that hold up under real operations.
    entries:
      - company: Axpo
        role: Data Engineer
        period: Dec 2025 - Present
        location: Madrid, Spain
        summary: >
          Maintains and evolves a Kubernetes-based data platform for asset
          optimization and logistics workflows in EU energy markets.
        achievements:
          - Builds backend and platform components with Python, FastAPI, PostgreSQL, and Airflow for internal data services.
          - Improves scalability, resilience, and day-to-day operability across core platform infrastructure and integrations.
          - Contributes to an in-house end-to-end lineage solution for row-level traceability, debugging, auditing, and quality investigations.
      - company: Thoughtworks
        role: Consultant Data Engineer
        period: Mar 2022 - Dec 2025
        location: Madrid, Spain
        summary: >
          Delivered data platform and DataOps work across airline, healthcare,
          and e-commerce engagements, with emphasis on auditable workflows and
          reliable data products.
        achievements:
          - Modernized a data serving platform with SQLMesh, Snowflake, AWS Glue, and SYNQ to enable scalable and auditable workflows.
          - Built a Microsoft Fabric platform PoC with PySpark, Delta, Power BI, Purview, and automated testing backed by Great Expectations.
          - Improved pipeline performance, metrics reliability, and stakeholder alignment for a leading e-commerce data platform built on Databricks.
          - Implemented ELT pipelines from transactional and event-driven systems on Databricks, with PyDeequ, LightStep, and Grafana to strengthen data quality and observability.
      - company: Telefonica
        role: Junior Backend Developer
        period: Sep 2021 - Feb 2022
        location: Madrid, Spain
        summary: >
          Built containerized backend services for the TV Open Platform with
          strong engineering discipline and cross-functional collaboration.
        achievements:
          - Developed microservices using TDD, SOLID principles, and Clean Architecture practices.
          - Shipped a Python Kafka consumer service integrated with SQL Server and deployed through Jenkins CI/CD.
          - Added Prometheus metrics and Grafana dashboards for real-time service visibility.


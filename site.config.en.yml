sections:
  - id: home
    navLabel: Home
    hero:
      eyebrow: Data Engineer & Backend Developer
      headline: Gerardo Vitale
      intro: >
        I help teams design and evolve data platforms, backend services, and
        analytics workflows that are reliable under production pressure. My
        work spans Python, Spark, SQL, dbt, SQLMesh, FastAPI, cloud-native
        delivery, and the operating discipline needed to keep business-critical
        systems trustworthy.
      missionLabel: What I build
      mission: >
        Outcome-focused data and backend systems: reliable pipelines, auditable
        transformations, API-ready services, and delivery paths that reduce
        surprises for both engineers and stakeholders. I combine enterprise
        experience with product-minded side projects that prove end-to-end
        execution.
      availability: Available for freelance data engineering and backend engagements.
      primaryCta:
        label: Discuss a project
        href: mailto:gerardo.vitale.errico@gmail.com
      secondaryCta:
        label: View selected work
        href: /projects
      supportNote: >
        Current work centers on EU energy markets at Axpo. Recent personal
        products include Fuel Precision, TrackAss, and this portfolio system:
        three different ways of showing data engineering, backend delivery, and
        product thinking in practice.
    stats:
      - label: Experience
        value: 4+ Years
        detail: Building production data platforms, backend services, and analytics workflows in enterprise environments.
      - label: Domains
        value: 4 Sectors
        detail: Energy, e-commerce, healthcare, and airline delivery with business-critical reliability requirements.
      - label: Delivery
        value: Platforms + APIs
        detail: From ingestion and transformation to quality controls, serving layers, and user-facing product workflows.
    principlesIntro:
      eyebrow: Working principles
      title: How I expect systems to behave
    principles:
      - title: Make data systems easy to trust
        body: >
          I prefer explicit transformations, clear ownership, and traceable
          delivery paths so teams can debug, audit, and change systems without
          guesswork.
      - title: Treat quality as product behavior
        body: >
          Reliable metrics, lineage, observability, and data quality checks are
          part of the deliverable, not cleanup work left for later.
      - title: Build for production, not for demos
        body: >
          Strong releases, automation, testing, and operational clarity matter
          because the system has to stay useful after launch and after handoff.

  - id: projects
    enabled: true
    navLabel: Projects
    intro:
      eyebrow: Selected Work
      title: Products and platforms that prove end-to-end delivery.
      description: >
        This work combines data engineering, backend development, and product
        thinking. The common pattern is turning raw data or messy workflows into
        systems that are useful, explainable, and safe to operate.
    homeCard:
      eyebrow: Selected work
      title: Projects
      description: Data products, backend systems, and production-minded delivery.
    interaction:
      eyebrow: Browse projects
      title: Filter by stack, product shape, or delivery focus.
      description: >
        Each project is here to show a different angle of the same profile:
        data pipelines, backend services, security posture, product thinking,
        and production-aware implementation.
      searchLabel: Search projects
      searchPlaceholder: Search by title, stack, or summary
      statusToolbarLabel: Project status filters
      statusLabels:
        all: all
        featured: featured
        live: live
        exploration: exploration
      resultsPrefix: Showing
      resultNounSingular: project
      resultNounPlural: projects
    projects:
      - slug: fuel-precision
        title: Fuel Precision
        summary: >
          Live fuel price intelligence platform for Spain that turns daily
          government data into route-aware search, trip planning, and regional
          analytics for drivers and fleet-oriented use cases.
        status: featured
        year: "2026"
        tags:
          - Python
          - FastAPI
          - DuckDB
          - GCP
          - Geospatial
          - Data Products
        highlights:
          - Built an end-to-end public-data product, from automated daily ingestion and validation to low-latency analytical serving.
          - Turned raw station data into decision tools such as best-station ranking, route-aware stop planning, and regional price analysis.
          - Structured the system for repeatable refreshes, explainable outputs, and production deployment instead of a portfolio-only demo.
        links:
          - label: Live app
            href: https://fuelprecision.com
            external: true
          - label: GitHub repo
            href: https://github.com/gerardovitale/travel-assistant
            external: true
      - slug: trackass
        title: Email Tracker Assistant
        summary: >
          Privacy-aware email analytics platform that tracks opens and signed
          link clicks, filters noisy bot traffic, and exposes activity through a
          lightweight dashboard and Gmail companion extension.
        status: featured
        year: "2026"
        tags:
          - Python
          - FastAPI
          - Security
          - SQLModel
          - Product Engineering
          - Browser Extension
        highlights:
          - Built the backend as a real product system with authentication, migrations, signed redirects, multi-tenant isolation, rate limiting, and automated tests.
          - Focused on trustworthy analytics by classifying bot, proxy, and self-open traffic instead of treating all events as human intent.
          - Extended the product beyond the API with a Gmail compose workflow and dashboard so the project demonstrates complete delivery, not just endpoint design.
        links:
          - label: GitHub repo
            href: https://github.com/gerardovitale/trackass
            external: true
      - slug: gerardo-vitale-portfolio
        title: Gerardo Vitale Portfolio
        summary: >
          Bilingual portfolio system that turns personal brand content into a
          typed, production-ready static site with schema-backed configuration,
          SEO safeguards, accessibility checks, and lightweight interactivity.
        status: live
        year: "2026"
        tags:
          - Astro
          - TypeScript
          - SEO
          - Accessibility
          - CI/CD
        highlights:
          - Built the site as a reusable content system rather than a one-off page, with typed config, locale support, and validation at build time.
          - Added production concerns such as canonical metadata, structured data, accessibility coverage, and containerized deployment.
          - Used the portfolio itself as a brand asset to align CV, LinkedIn, Malt, and project narratives around one consistent professional profile.
        links:
          - label: Live site
            href: /
            external: false
          - label: GitHub repo
            href: https://github.com/gerardovitale/portfolio
            external: true

  - id: experience
    enabled: true
    navLabel: Experience
    intro:
      eyebrow: Experience
      title: Enterprise data engineering and backend delivery across four domains.
      description: >
        My experience combines data platform modernization, backend services,
        and delivery discipline. The recurring goal is to make complex systems
        more reliable, auditable, and useful for real business decisions.
    homeCard:
      eyebrow: Career path
      title: Experience
      description: Roles, progression, and the systems work behind them.
    timeline:
      eyebrow: Timeline
      title: Roles and impact
      description: >
        The through-line is consistent: stronger data platforms, clearer
        delivery, better quality controls, and systems that behave well in
        production.
    entries:
      - company: Axpo
        role: Data Engineer
        period: Dec 2025 - Present
        location: Madrid, Spain
        summary: >
          Maintains and evolves a Kubernetes-based data platform for asset
          optimization and logistics workflows in EU energy markets.
        achievements:
          - Builds backend and data platform components with Python, FastAPI, PostgreSQL, and Airflow for internal services and business-critical workflows.
          - Improves platform scalability, resilience, and day-to-day operability across core infrastructure, integrations, and engineering practices.
          - Contributes to an in-house end-to-end lineage capability aimed at row-level traceability for debugging, auditing, and data quality investigations.
      - company: Thoughtworks
        role: Data Engineer
        period: Mar 2023 - Dec 2025
        location: Madrid, Spain
        summary: >
          Delivered data platform modernization for airline, healthcare, and
          e-commerce clients, with strong focus on auditable workflows,
          scalable architectures, and reliable data products.
        achievements:
          - Modernized an airline data serving platform with SQLMesh, Snowflake, AWS Glue, and SYNQ to create scalable, maintainable, and auditable data workflows.
          - Delivered Terraform-based deployment kits and modular SQLMesh pipelines that improved CI/CD consistency, historical integrity, and release reliability.
          - Built a Microsoft Fabric proof of concept with PySpark, Delta, Power BI, Purview, and Great Expectations to support scalable governance and trustworthy analytics.
          - Improved performance, metric trustworthiness, and product alignment across a major e-commerce data platform through pipeline redesign and close stakeholder collaboration.
      - company: Thoughtworks
        role: Junior Data Engineer
        period: Mar 2022 - Mar 2023
        location: Madrid, Spain
        summary: >
          Built foundational data platform capabilities for a large e-commerce
          client, combining ELT delivery, testing, observability, and data
          quality controls.
        achievements:
          - Helped build a data platform from scratch serving business-critical data products consumed through MicroStrategy dashboards.
          - Designed ELT pipelines that integrated transactional and event-driven sources, with CI/CD on Kubernetes to improve deployment reliability.
          - Implemented PyDeequ data quality checks with LightStep and Grafana alerting to enforce SLA-driven monitoring and trust in metrics.
          - Contributed to delivery through testing strategy, demos, agile collaboration, and pair programming to keep pipelines robust and maintainable.
      - company: Telefonica
        role: Junior Backend Developer
        period: Sep 2021 - Feb 2022
        location: Madrid, Spain
        summary: >
          Built containerized backend services for the TV Open Platform with
          strong engineering discipline and cross-functional collaboration.
        achievements:
          - Developed microservices using TDD, SOLID principles, and Clean Architecture practices in a multidisciplinary delivery environment.
          - Built a Python Kafka consumer integrated with SQL Server and deployed through Jenkins CI/CD for reliable backend delivery.
          - Added Prometheus metrics and Grafana dashboards to improve service visibility and real-time operational monitoring.

